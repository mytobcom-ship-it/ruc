#========================================================================
# 맵매칭 바이너리(link.psf) 생성기 환경설정 (Oracle 미사용 / Shapefile 입력)
# 실행: bin 디렉토리에서 ./MakeBinary  (config.ini 는 실행 경로에 위치)
#========================================================================

#path  - 로그 경로 (상대 또는 절대 경로)
#level - 로그 레벨 (0:TRACE, 1:DEBUG, 2:INFO, 3:WARN, 4:ERROR)
[log]
path=./log
level=1

#link      - 링크 PolyLine shapefile(.shp) 경로 (동일 경로에 .dbf, .shx 필요)
#node      - 노드 Point shapefile(.shp) 경로 (생략 가능: 생략 시 링크 끝점으로 노드 좌표 대체)
#coordtype - 입력 좌표계
#  1 : WGS84GEO   (경위도, 변환 없음)
#  2 : GRS80GEO   (경위도)
#  3 : GRS80TM    (EPSG:5181, Central Belt 2000, FN=500000)
#  4 : GRS80UTMK  (EPSG:5179, Unified UTM-K)
#  5 : KATECH     (TM128)
#  6 : BESSELGEO
#  7 : BESSELTM
#  8 : EPSG3857
#  9 : GRS80TM2010 (EPSG:5186, Central Belt 2010, FN=600000, MOCT 표준노드링크 실제 좌표계)
[shapefile]
# 웹(prim_link_info)과 동일 좌표 사용: 원본 5186 을 proj(pyproj)로 4326 재투영한 shp (2026-07-15 최정우 수정)
#   → coordtype=1(WGS84GEO)로 재변환 없이 사용, 변환 구현 차이 제거(양자화 ~0.3m 만 잔존)
link=../data/MOCT_LINK_4326.shp
node=../data/MOCT_NODE_4326.shp
coordtype=1

#datadir - 원본 데이터 디렉토리 (참고용)
#file    - 생성할 geometry binary file 명 (실행 경로에 생성)
[data]
datadir=../data
file=./link.psf

#turninfo  - 회전제한 TURNINFO.dbf 경로 (필수: 금지회전 반영)
#multilink - 다중노선 MULTILINK.dbf 경로 (참고)
[dbf]
turninfo=../data/TURNINFO.dbf
multilink=../data/MULTILINK.dbf

#링크 .dbf 필드명 매핑 (실제 shapefile 의 컬럼명에 맞게 수정)
#length 필드가 없으면 형상(버텍스)에서 자동 계산
[link_field]
id=LINK_ID
maxspeed=MAX_SPD
length=LENGTH
roadrank=ROAD_RANK
connect=CONNECT
roadtype=ROAD_TYPE
lanes=LANES
roadname=ROAD_NAME
fnode=F_NODE
tnode=T_NODE

#노드 .dbf 필드명 매핑
[node_field]
id=NODE_ID
type=NODE_TYPE
