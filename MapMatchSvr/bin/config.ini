#========================================================================
# RUC 위치검증								(맵매칭) 서버 환경설정
# 기본값 상수: src/ConfigDefaults.h						(CFG_DEF_<키약어>)
#========================================================================

# path                              - 로그 경로                          (기본: CFG_DEF_PATH=./log)
# level                             - 로그 레벨 0~4                      (기본: CFG_DEF_LEVEL=2)
# runtime                           - 로그 정리 시각 0~23, -1=미사용     (기본: CFG_DEF_RUNTIME=-1)
# keepday                           - 로그 보관 일수                     (기본: CFG_DEF_KEEPDAY=7)
[log]
path=./log
level=1
runtime=0
keepday=7

# host                              - DB 호스트                           (기본: CFG_DEF_HOST=)
# port                              - DB 포트                             (기본: CFG_DEF_PORT=5432)
# userid                            - DB 사용자                           (기본: CFG_DEF_USERID=postgres)
# password                          - DB 비밀번호                         (기본: CFG_DEF_PASSWORD=postgres)
# minconnect                        - 풀 최소 연결                        (기본: CFG_DEF_MINCONNECT=3)
# maxconnect                        - 풀 최대 연결, 0=자동                (기본: CFG_DEF_MAXCONNECT=0)
# conn_retry_max                    - 연결 재시도 횟수                    (기본: CFG_DEF_CONN_RETRY_MAX=3)
# conn_retry_wait                   - 연결 재시도 대기 ms                 (기본: CFG_DEF_CONN_RETRY_WAIT=100)
[database]
host=127.0.0.1
port=5432
name=roadnet
userid=mytobcom
password=my664761
minconnect=11
maxconnect=13
conn_retry_max=3
conn_retry_wait=100

[query]
file=./query.sql

# charge_insert                     - 과금 적재                           (선택, 비우면 비활성)
[sql]
rawlog_recover=rawgps_recover
rawlog_select=rawgps_select
rawlog_update=rawgps_update
charge_insert=charge_insert

# limit                             - 1회 fetch 건수                      (기본: CFG_DEF_LIMIT=500)
# fetch_interval                    - poll 주기 ms                        (기본: CFG_DEF_FETCH_INTVL=500)
# queue_pause_count                 - 큐>= 시 poll 중단                   (기본: CFG_DEF_Q_PAUSE_CNT=400)
# queue_max_count                   - 큐>= 시 최대 sleep                  (기본: CFG_DEF_Q_MAX_CNT=800)
# queue_busy_min                    - backpressure 최소 ms                (기본: CFG_DEF_Q_BUSY_MIN=2000)
# queue_busy_max                    - poll 최대 대기 ms                   (기본: CFG_DEF_Q_BUSY_MAX=10000)
[feeder]
limit=500
fetch_interval=500
queue_pause_count=400
queue_max_count=800
queue_busy_min=2000
queue_busy_max=10000

# ttl_sec                           - 세션 TTL sec                        (기본: CFG_DEF_TTL=3600)
# shutdown_wait                     - active batch 대기 ms                (기본: CFG_DEF_SHUTDOWN_WAIT=30000)
# retry_max                         - PENDING 재처리 상한                 (기본: CFG_DEF_RETRY_MAX=5)
[worker]
ttl_sec=3600
shutdown_wait=30000
retry_max=5

# count                             - 워커 스레드 수                      (기본: CFG_DEF_COUNT=10)
[threads]
count=10

[data]
file=link.psf

# geodetic                          - 측지계 1~4                           (기본: CFG_DEF_GEODETIC=1)
# radius                            - 검색 반경 m                          (기본: CFG_DEF_RADIUS=50)
# radius_scale                      - scale×ACCURACY_M					  (기본: CFG_DEF_RADIUS_SCALE=2.5)
# radius_min                        - 적응형 하한 m						   (기본: CFG_DEF_RADIUS_MIN=20)
# radius_max                        - 적응형 상한 (cap) m                  (기본: radius 값). 2.5×acc 최대치. 20~30m 밴드 확대 위해 75
# radius_skip                       - 수평오차 SKIP m                      (초과 시 제외). 정확도 등급제: 50 초과만 제외(15~50m는 반경확대·저신뢰로 활용)
# alt_gap                           - 고도 허용차 m                        (기본: CFG_DEF_ALT_GAP=8) (2026-07-21 최정우 수정 — altitude_gap 이름 변경)
# alt_penalty                       - 고도·ROAD_TYPE 보조 비용. 양수=불일치 페널티·음수=일치 보너스
#                                      (기본: CFG_DEF_ALT_PENALTY=10) (2026-07-21 최정우 수정 — altitude_bonus/altitude_penalty 통합)
# alt_weight                        - 고도차가 alt_gap 초과 시 1m당 추가비용 배율. 0=고도 보조 점수 기능 전체 비활성
#                                      (기본: CFG_DEF_ALT_WEIGHT=0.5) (2026-07-21 최정우 수정 — altitude_weight 이름 변경)
# alt_slope                         - 고도 신뢰도 임계값 — |직전·현재 고도차(m)| ÷ 수평이동거리(m) 비율이 이 값을
#                                      초과하면 GPS 고도값을 불신하여 이번 포인트는 고도 보조 점수를 적용하지 않음(0)
#                                      예) 50m 이동 중 고도 20m 변화 → 기울기 0.4 > 0.12 → 고도 무시
#                                      (기본: CFG_DEF_ALT_SLOPE=0.12) (2026-07-21 최정우 수정 — altitude_slope 이름 변경)
# reverse_confirm                   - 연속 역행(위치 역행 + heading 도 역방향 일치) 확정 포인트 수. 미만이면 노이즈로 보고
#                                      SKIP 저장·세션 앵커 고정, 이상이면 실제 이동으로 확정하고 앵커 재설정
#                                      (기본: CFG_DEF_REVERSE_CONFIRM=3) (2026-07-21 최정우 추가 — 역행(dip) 실시간 판정 대체)
#                                      (2026-07-22 최정우 수정 — reverse_weight/speed/margin 은 실제 판정(SKIP/MATCHED)에
#                                      영향을 주지 않는 죽은 파라미터로 확인되어 소스와 함께 제거)
# speed_factor                      - 이동거리 환산속도/SPEED_KMH 배율 상한. 0=비활성
#                                      (기본: CFG_DEF_SPEED_FACTOR=2.0) (2026-07-21 최정우 수정 — speed_diff_factor 이름 변경)
# speed_margin                      - 위 배율에 더하는 여유분(km/h, 노이즈 허용)
#                                      (기본: CFG_DEF_SPEED_MARGIN=25) (2026-07-21 최정우 수정 — speed_diff_margin 이름 변경)
# maxstep                           - 연속 링크 탐색                       (필수 >0)
# distance                          - Heading 유효거리 m				   (기본: CFG_DEF_DISTANCE=500)
# timeout                           - 1건 처리 임계 ms                     (기본: CFG_DEF_TIMEOUT=200)
[mapmatch]
geodetic=2
radius=50
radius_scale=2.5
radius_min=20
radius_max=75
radius_skip=50
# 고도 허용차 m
alt_gap=8
# 고도·ROAD_TYPE 보조 비용. 양수=불일치 페널티·음수=일치 보너스
alt_penalty=10
# 고도차가 alt_gap 초과 시 1m당 추가비용 배율. 0=고도 보조 점수 기능 전체 비활성
alt_weight=0.5
# 고도 신뢰도 임계값 — |직전·현재 고도차(m)| ÷ 수평이동거리(m) 비율이 이 값을 초과하면
# GPS 고도값을 불신하여 이번 포인트는 고도 보조 점수를 적용하지 않음(0)
alt_slope=0.12
reverse_confirm=3
# 허용 상한(km/h) = 신고된속도 × speed_factor + speed_margin
speed_factor=2.0
speed_margin=25
maxstep=2
distance=500
timeout=200
