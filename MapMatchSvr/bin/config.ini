#========================================================================
# RUC 위치검증(맵매칭) 서버 환경설정
# 실행: bin 디렉토리에서 ./MapMatchSvr  (config.ini 는 실행 경로에 위치)
# ※ config.ini 는 로컬 비밀정보(.gitignore) — DB 접속정보 등은 환경에 맞게 수정
#========================================================================

#path    - 로그 경로 (상대/절대)
#level   - 로그 레벨 (0:TRACE, 1:DEBUG, 2:INFO, 3:WARN, 4:ERROR)
#runtime - 로그 정리 실행 시각(0~23시). -1=미사용
#keepday - 로그 보관 일수 (runtime 사용 시 유효)
[log]
path=./log
level=1
runtime=0
keepday=7

#host/port/name/userid/password - PostgreSQL 접속정보 (필수)
#minconnect - 커넥션 풀 최소 연결 (권장: 워커수+1)
#maxconnect - 커넥션 풀 최대 연결 (0=자동: 워커수+2, 하한 워커수+1)
[database]
host=127.0.0.1
port=5432
name=roadnet
userid=mytobcom
password=my664761
minconnect=11
maxconnect=13

#file - SQL 세션 파일 경로 ([sql] 의 세션명이 이 파일의 섹션명과 일치해야 함)
[query]
file=./query.sql

#query.sql 내 섹션명 매핑
#rawlog_recover - 기동 시 1회 PROCESSING→PENDING 복구
#rawlog_select  - PENDING 선점(claim) 조회
#rawlog_update  - 맵매칭 결과 갱신 / 선점 해제(release) 공용
#charge_insert  - 과금 대상 적재 (#10 재설계 후 사용)
[sql]
rawlog_recover=rawgps_recover
rawlog_select=rawgps_select
rawlog_update=rawgps_update
charge_insert=charge_insert

#limit           - 1회 fetch(select) 최대 건수
#fetch_interval  - poll 주기 (ms)
#queue_pause_count- 워커 큐 적재 >= 시 poll 중단(backpressure)
#queue_max_count - 워커 큐 적재 >= 시 poll 중단 + 최대 sleep
#queue_busy_min  - backpressure 기본 대기 (ms)
#queue_busy_max  - poll 최대 대기 (ms)
[feeder]
limit=500
fetch_interval=500
queue_pause_count=400
queue_max_count=800
queue_busy_min=2000
queue_busy_max=10000

#ttl_sec       - device 세션 TTL(초). 미수신 경과 세션 정리 (0=비활성)
#shutdown_wait - 종료 시 워커 큐 drain 대기 (ms)
#retry_max     - PENDING 재처리 상한. 초과 시 ERROR(4) 고정 (0=무제한)
[worker]
ttl_sec=3600
shutdown_wait=30000
retry_max=5

#count - 워커 스레드 수
[threads]
count=10

#file - 맵매칭 바이너리 (CreateData가 MOCT_LINK/NODE shapefile로 생성한 link.psf)
[data]
file=link.psf

#geodetic     - GPS 좌표 측지계 (1:EPSG3857, 2:WGS84GEO, 3:KATECH, 4:BESSELGEO)
#radius       - 기본 검색 반경(m). ACCURACY_M NULL 시 폴백 (0~250)
#radius_scale - 적응형 검색반경 = scale × ACCURACY_M (accuracy_k 별칭)
#radius_min   - 적응형 검색 반경 하한(m)
#radius_max   - 적응형 검색 반경 상한(m). 미지정 시 radius
#radius_skip  - ACCURACY_M(수평오차,m) 초과 시 맵매칭 SKIP. 0=비활성
#               (문서 기준 15m 초과 신뢰도 저하 → 15. accuracy_skip 별칭)
#altitude_*   - 연속 맵매칭 고도(ALTITUDE_M) 보조 점수 (weight=0 이면 비활성)
#maxstep      - 연속 맵매칭 연결 링크 최대 탐색 스텝 (필수, >0)
#distance     - (레거시) 배치 경로 전용
#timeout      - 1 GPS 맵매칭 처리 임계(ms). 초과 시 ERROR(4) 격리. 0=비활성
[mapmatch]
geodetic=2
radius=50
radius_scale=2.5
radius_min=20
radius_max=50
radius_skip=15
altitude_gap=8
altitude_bonus=3
altitude_penalty=10
altitude_weight=0.5
altitude_slope=0.12
maxstep=2
distance=500
timeout=200
