#======================================================================
# RUC 맵매칭 시뮬레이터 (RawGpsSimSvr) 환경설정 - 디버깅용 (차량 1대)
#======================================================================

#path  - 로그 경로
#level - 로그 레벨 (0:TRACE 1:DEBUG 2:INFO 3:WARN 4:ERROR)
[log]
path=./log
level=1

#host/port/name - DB 접속 정보 (도로망과 동일 DB)
#userid/password - 시뮬레이터 접속 계정
[database]
host=localhost
port=5432
name=roadnet
userid=mytobcom
password=my664761

#file - 쿼리 파일 경로
[query]
file=./query.sql

#vehicles   - 동시 운행 차량 수 (디버깅: 1대)
#flush_sec  - DB INSERT 주기 (초). 1초 tick 으로 모았다가 N초마다 일괄 적재
#report_sec - 통계 로그 출력 주기 (초)
#idle_prob         - 매 tick 정차(IDLE) 확률 (0~1)
#omit_all_prob     - 속도·방위각·고도·수평오차·배터리 전부 누락 확률 (0~1, 드물게) (2026-07-10 최정우 주석 추가)
#omit_partial_prob - 위 보조 필드 중 1~2개만 누락 확률 (0~1, 가끔) (2026-07-10 최정우 주석 추가)
[sim]
vehicles=1
flush_sec=2
report_sec=10
idle_prob=0.05
omit_all_prob=0.005
omit_partial_prob=0.08

#주행 영역 (WGS-84 경위도 bounding box). 기본: 서울 일부
[area]
min_lon=126.90
min_lat=37.48
max_lon=127.10
max_lat=37.62

#min_m           - 1회 운행 최소 경로 길이 (m)
#max_links       - 연결 링크 최대 개수
#seed_candidates - 시작 링크 후보 수
[route]
min_m=2000
max_links=20
seed_candidates=20

#sigma_m - 도로 이탈 GPS 오차 표준편차 (m)
#max_m   - 도로 이탈 GPS 오차 최대값 (m). 표준노드링크 기준 1~60m 랜덤
[noise]
sigma_m=15.0
max_m=60.0

#factor_min/max  - 제한속도 대비 주행속도 비율 범위
#default_max_kmh - 제한속도 미지정 링크 기본 속도 (km/h)
[speed]
factor_min=0.5
factor_max=1.0
default_max_kmh=50.0
