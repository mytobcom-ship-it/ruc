#======================================================================
# RUC 맵매칭 시뮬레이터 (RawGpsSimSvr) 환경설정
#======================================================================

#path  - 로그 경로
#level - 로그 레벨 (0:TRACE 1:DEBUG 2:INFO 3:WARN 4:ERROR)
[log]
path=./log
level=1

#host/port/name - DB 접속 정보 (도로망과 동일 DB)
#userid/password - 시뮬레이터 접속 계정
[database]
host=localhost
port=5432
name=roadnet
userid=mytobcom
password=my664761

#file - 쿼리 파일 경로
[query]
file=./query.sql

#vehicles      - 동시 운행 차량 수 (웹 뷰어 "차량 수" 콤보박스로도 조정 가능 — "신규테스트" 클릭 시 이 값을 덮어씀)
#tick_sec_min  - 차량별 GPS 표본 생성(보고) 주기 랜덤 범위 하한 (초)
#tick_sec_max  - 위 범위 상한 (초). 차량마다 [min,max] 에서 독립적으로 하나 뽑아 운행 내내 고정
#                사용 — 실제 단말마다 보고 간격이 다르고, 그로 인해 최초 표본 시점도 차량마다
#                조금씩 어긋나는 것을 흉내낸다. min=max 로 두면 전 차량 동일 주기(기존 방식).
#                가감속 등 물리량은 실제 초 단위로 스케일링되므로 값과 무관하게 정상 (2026-07-22 최정우 추가, 수정 — 차량별 랜덤화)
#flush_sec     - DB INSERT 주기 (초). 차량별 tick_sec 과 무관한 서버 공용 배치 — N초마다 그때까지 모인 표본을 일괄 적재
#report_sec  - 통계 로그 출력 주기 (초)
#max_samples - 총 GPS 생성(=표본 1건) 상한 (0=무제한). 도달 시 flush 후 자동 종료 (2026-07-20 최정우 추가)
#              tick_sec 이 클수록 같은 실주행시간에 표본 수는 줄어듦(물리적 이동은 동일) — 대략
#              차량당 2~3회 완주 기준으로 잡은 값. 저속 이면도로 구간이 많으면 실주행시간 자체가
#              늘어날 수 있음 — 매 운행마다 출발점이 bbox 전역에서 새로 랜덤 선택되므로,
#              여러 회 완주해야 서로 다른 지역을 도는 게 보임 (기존 60은 첫 운행도 못 끝내고 종료돼
#              항상 출발지 인근만 보였음) (2026-07-22 최정우 수정)
#idle_prob         - 매 tick 정차(IDLE) 확률 (0~1)
#omit_all_prob     - 속도·방위각·고도·수평오차·배터리 전부 누락 확률 (0~1, 드물게) (2026-07-10 최정우 주석 추가)
#omit_partial_prob - 위 보조 필드 중 1~2개만 누락 확률 (0~1, 가끔) (2026-07-10 최정우 주석 추가)
[sim]
vehicles=10
tick_sec_min=3.0
tick_sec_max=8.0
flush_sec=2
report_sec=10
max_samples=1500
idle_prob=0.05
omit_all_prob=0.005
omit_partial_prob=0.08

#주행 영역 (WGS-84 경위도 bounding box). 기본: 서울 일부
[area]
min_lon=126.90
min_lat=37.48
max_lon=127.10
max_lat=37.62

#min_m           - 1회 운행 최소 경로 길이 (m)
#max_links       - 연결 링크 최대 개수
#seed_candidates - 시작 링크 후보 수
[route]
min_m=2000
max_links=20
seed_candidates=20

#sigma_m       - 일반 GPS 오차 표준편차 (m). 현실적 스마트폰 수준(개활 3~5m, 도심 5~15m)
#max_m         - 일반 오차 최대값 (m, 정규분포 cap)
#outlier_prob  - 큰 튀는 좌표(멀티패스·도심협곡) 발생 확률 (0~1) — 예외처리 검증용
#outlier_min_m - 튀는 좌표 최소 오프셋 (m)
#outlier_max_m - 튀는 좌표 최대 오프셋 (m)
[noise]
sigma_m=4.0
max_m=20.0
outlier_prob=0.03
outlier_min_m=25.0
outlier_max_m=80.0

#factor_min/max  - 제한속도 대비 주행속도 비율 범위
#default_max_kmh - 제한속도 미지정 링크 기본 속도 (km/h)
[speed]
factor_min=0.5
factor_max=1.0
default_max_kmh=50.0

#drop_prob - 터널(002)·지하차도(004) 구간에서 tick 당 GPS 표본을 생성하지 않을 확률 (0~1)
#            GPS 음영구간(신호 두절) 시뮬레이션. START/END 이벤트는 예외로 항상 생성 (2026-07-21 최정우 추가)
[deadzone]
drop_prob=0.9
