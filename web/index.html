<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUC 맵매칭 GPS 뷰어</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    #toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 8px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    }
    #toolbar label { font-size: 13px; color: #334155; }
    #toolbar select, #toolbar button {
      font-size: 13px; padding: 4px 8px;
    }
    #map { height: calc(100vh - 48px); width: 100%; }
    #legend {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.92); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .line { display: inline-block; width: 18px; height: 3px; margin-right: 4px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Trip
      <select id="tripSelect"><option value="">로딩…</option></select>
    </label>
    <button id="btnReload" type="button">새로고침</button>
    <label><input type="checkbox" id="chkPoll" /> 자동 갱신</label>
    <span id="status" style="font-size:12px;color:#64748b;"></span>
  </div>
  <div id="map"></div>
  <div id="legend">
    <div><span class="line" style="background:#1e3a8a;"></span>주변 도로 (moct_link)</div>
    <div><span class="dot" style="background:#e53935;"></span>GPS 원시</div>
    <div><span class="dot" style="background:#1e88e5;"></span>맵매칭 성공 (MATCHED)</div>
    <div><span class="dot" style="background:#fb8c00;"></span>SKIP (참고 좌표)</div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
