<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>RUC 맵매칭 GPS 뷰어</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    #toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 8px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    }
    #toolbar label { font-size: 13px; color: #334155; }
    #toolbar select, #toolbar button {
      font-size: 13px; padding: 4px 8px;
    }
    #map { height: calc(100vh - 48px); width: 100%; }
    #legend {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.92); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .line { display: inline-block; width: 18px; height: 3px; margin-right: 4px; vertical-align: middle; }
    .road-dir-arrow { background: transparent; border: none; }
    .tip-gps, .tip-match, .tip-skip {
      font-size: 10px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,.15); border-width: 1px; border-style: solid;
    }
    .tip-gps { color: #b71c1c; background: #fff; border-color: #e53935; }
    .tip-match { color: #0d47a1; background: #fff; border-color: #1e88e5; }
    .tip-skip { color: #e65100; background: #fff; border-color: #fb8c00; }
    /* SKIP(3)·ERROR(4) 맵매칭 좌표(M) — 실패 표시 */
    .tip-fail { text-decoration: line-through; opacity: 0.88; }
    /* GPS↔매칭 점선 마우스오버 INTERSECT_LEN(m) 툴팁 (2026-07-15 최정우 추가) */
    .tip-intersect {
      font-size: 11px; font-weight: 700; color: #0f172a; background: #fef9c3;
      border: 1px solid #94a3b8; border-radius: 3px; padding: 2px 6px;
    }
    /* 마우스 커서를 손모양이 아닌 화살표(기본)로 (2026-07-15 최정우 추가) */
    .leaflet-grab,
    .leaflet-interactive,
    .leaflet-container {
      cursor: default !important;
    }
    .leaflet-dragging .leaflet-grab,
    .leaflet-dragging .leaflet-interactive {
      cursor: default !important;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Trip
      <select id="tripSelect"><option value="">로딩…</option></select>
    </label>
    <button id="btnReload" type="button">새로고침</button>
    <label><input type="checkbox" id="chkPoll" checked /> 자동 갱신</label>
    <label><input type="checkbox" id="chkFollow" checked /> 최신 Trip</label>
    <span id="status" style="font-size:12px;color:#64748b;"></span>
  </div>
  <div id="map"></div>
  <div id="legend">
    <div><span class="line" style="background:#1e3a8a;"></span>주변 도로 (prim_link_info · PSF)</div>
    <div style="padding-left:14px;color:#64748b;">▶ f_node → t_node 진행방향 (줌 14+)</div>
    <div><span class="dot" style="background:#e53935;"></span>GPS 원시 <span style="color:#64748b;">(G순번)</span></div>
    <div><span class="dot" style="background:#1e88e5;"></span>맵매칭 성공 <span style="color:#64748b;">(M순번)</span></div>
    <div><span class="dot" style="background:#fb8c00;"></span>SKIP <span style="color:#64748b;">(M순번)</span></div>
    <div><span style="text-decoration:line-through;color:#e65100;">M순번</span> 맵매칭 실패 <span style="color:#64748b;">(SKIP·ERROR)</span></div>
    <div><span class="line" style="background:#94a3b8;height:0;border-top:2px dashed #94a3b8;"></span>GPS↔세그먼트 교차 <span style="color:#64748b;">(intersect_len)</span></div>
    <div><span class="line" style="background:#e53935;height:0;border-top:2px dashed #e53935;"></span>GPS 궤적(순서 연결)</div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js?v=20260715arrowdir"></script>
</body>
</html>
