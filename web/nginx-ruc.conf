# RUC map viewer — nginx 가 80 을 받아 Flask(8088) 로 프록시
# 설치: sudo cp nginx-ruc.conf /etc/nginx/conf.d/ruc-mapviewer.conf
#       sudo mv /etc/nginx/conf.d/ptw-ontology.conf /etc/nginx/conf.d/ptw-ontology.conf.off  # 80 충돌 시
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ruc-mapviewer.access.log;
    error_log  /var/log/nginx/ruc-mapviewer.error.log;
}
